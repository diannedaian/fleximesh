<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D AI Model Generator</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f12;
            --sidebar-bg: #16161a;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #2e2e38;
            --error-color: #ef4444;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-sans);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar Styling (40% width) */
        #stage-container {
            width: 40%;
            min-width: 400px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            position: relative;
            box-shadow: 10px 0 30px rgba(0,0,0,0.3);
            overflow-y: auto;
        }

        /* Three.js Container (60% width) */
        #three-container {
            flex: 1;
            height: 100%;
            position: relative;
            background: #3d3d3d; /* Matches standard 3D viewport dark grey */
        }

        /* Stage Content Inner */
        .stage-view {
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Typography */
        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2.5rem;
        }

        /* Prompt Input Styles */
        .prompt-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            flex-grow: 1;
        }

        .textarea-wrapper {
            position: relative;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
            padding: 2px;
        }

        .textarea-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .prompt-input-textarea {
            width: 100%;
            height: 240px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1.1rem;
            line-height: 1.6;
            padding: 1.25rem;
            resize: none;
            outline: none;
        }

        .prompt-input-textarea::placeholder {
            color: #475569;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .input-status-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-top: -0.5rem;
        }

        .hint {
            color: var(--text-secondary);
            font-style: italic;
        }

        .prompt-footer {
            margin-top: 2rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }

        .shortcut-hint {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        kbd {
            background: #2e2e38;
            border-radius: 4px;
            padding: 2px 6px;
            font-family: monospace;
            border: 1px solid #475569;
        }

        /* Generating Stage Styles */
        .generating-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid var(--border-color);
            border-bottom-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 2rem;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake-error {
            animation: shake 0.2s ease 2;
            border-color: var(--error-color) !important;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Sidebar -->
        <div id="stage-container">
            <!-- Stage content is injected here -->
        </div>

        <!-- 3D Canvas -->
        <div id="three-container"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // --- Application State ---
        const appState = {
            stage: 'prompt-input',
            prompt: '',
            subscribers: [],
            setStage(newStage) {
                const prev = this.stage;
                this.stage = newStage;
                this.notify('stageChange', { current: newStage, previous: prev });
            },
            subscribe(event, callback) {
                this.subscribers.push({ event, callback });
            },
            notify(event, data) {
                this.subscribers
                    .filter(s => s.event === event)
                    .forEach(s => s.callback(data));
            }
        };

        // --- Three.js Setup ---
        let scene, camera, renderer, controls, currentModel = null;

        function initThree() {
            const container = document.getElementById('three-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x3d3d3d); // Darker charcoal background

            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(10, 8, 10);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // OrbitControls for modeling app behavior
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = true;

            // 1. Grid Helper - Configured for dark Blender-style appearance
            const gridSize = 40;
            const divisions = 40;
            // grid color (minor lines), center color (ignored here for custom axis lines)
            const gridHelper = new THREE.GridHelper(gridSize, divisions, 0x4d4d4d, 0x4d4d4d);
            scene.add(gridHelper);

            // 2. Custom Axis Lines (Infinite style like Blender)
            // X-Axis (Red)
            const xPoints = [new THREE.Vector3(-gridSize/2, 0.001, 0), new THREE.Vector3(gridSize/2, 0.001, 0)];
            const xGeometry = new THREE.BufferGeometry().setFromPoints(xPoints);
            const xMaterial = new THREE.LineBasicMaterial({ color: 0xff3b3b, linewidth: 2 });
            const xAxis = new THREE.Line(xGeometry, xMaterial);
            scene.add(xAxis);

            // Y-Axis (Green) - In Three.js, horizontal grid plane usually uses Z for the depth axis
            // But visually in Blender, the green line represents the Y axis in its coordinate system.
            // In Three.js GridHelper context (XZ plane), the green line is the Z axis.
            const yPoints = [new THREE.Vector3(0, 0.001, -gridSize/2), new THREE.Vector3(0, 0.001, gridSize/2)];
            const yGeometry = new THREE.BufferGeometry().setFromPoints(yPoints);
            const yMaterial = new THREE.LineBasicMaterial({ color: 0x3bff3b, linewidth: 2 });
            const yAxis = new THREE.Line(yGeometry, yMaterial);
            scene.add(yAxis);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            const container = document.getElementById('three-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        /**
         * Utility to add a model to the scene
         */
        function updateSceneModel(modelObject) {
            if (currentModel) {
                scene.remove(currentModel);
            }
            currentModel = modelObject;
            scene.add(currentModel);
        }

        // --- Stage Views ---

        function renderPromptInput() {
            const html = `
                <div class="stage-view animate-fade-in">
                    <header class="prompt-header">
                        <h1 class="text-gradient">Create 3D</h1>
                        <p class="subtitle">Describe your vision. Our AI will manifest it in three dimensions.</p>
                    </header>
                    <div class="prompt-container">
                        <div class="textarea-wrapper" id="input-wrapper">
                            <textarea id="prompt-input-textarea" class="prompt-input-textarea"
                                placeholder='e.g., "A futuristic sci-fi helmet with glowing blue neon accents..."'>${appState.prompt}</textarea>
                        </div>
                        <div class="input-status-row">
                            <span class="hint">Tip: Use descriptive adjectives for better results.</span>
                        </div>
                        <div class="prompt-actions">
                            <button id="generate-btn" class="btn-primary">
                                <span>Confirm and Generate</span>
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M5 12h14M12 5l7 7-7 7"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <footer class="prompt-footer">
                        <div class="shortcut-hint">
                            <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to generate
                        </div>
                    </footer>
                </div>
            `;

            const container = document.getElementById('stage-container');
            container.innerHTML = html;

            const textarea = document.getElementById('prompt-input-textarea');
            const btn = document.getElementById('generate-btn');
            const wrapper = document.getElementById('input-wrapper');

            const handleAction = () => {
                const val = textarea.value.trim();
                if (!val) {
                    wrapper.classList.add('shake-error');
                    textarea.placeholder = "Please describe something first!";
                    setTimeout(() => wrapper.classList.remove('shake-error'), 500);
                    return;
                }
                appState.prompt = val;
                appState.setStage('generating');
            };

            btn.addEventListener('click', handleAction);
            textarea.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    handleAction();
                }
            });

            setTimeout(() => textarea.focus(), 100);
        }

        function renderGenerating() {
            const html = `
                <div class="stage-view animate-fade-in">
                    <div class="generating-view">
                        <span class="loader"></span>
                        <h2 style="margin-bottom: 0.5rem">Generating Model</h2>
                        <p class="subtitle" style="margin-bottom: 2rem">Processing: "${appState.prompt}"</p>
                        <div style="width: 100%; height: 4px; background: var(--border-color); border-radius: 2px; overflow: hidden">
                            <div style="height: 100%; width: 40%; background: var(--accent-color); animation: slide 2s infinite ease-in-out"></div>
                        </div>
                        <button id="back-btn" class="btn-primary" style="margin-top: 3rem; background: transparent; border: 1px solid var(--border-color)">
                            Cancel
                        </button>
                    </div>
                </div>
                <style>
                    @keyframes slide {
                        0% { transform: translateX(-100%) }
                        100% { transform: translateX(250%) }
                    }
                </style>
            `;

            const container = document.getElementById('stage-container');
            container.innerHTML = html;

            document.getElementById('back-btn').addEventListener('click', () => {
                appState.setStage('prompt-input');
            });
        }

        // --- Manager ---
        function updateStage(data) {
            if (data.current === 'prompt-input') renderPromptInput();
            if (data.current === 'generating') renderGenerating();
        }

        // Initialize
        window.onload = () => {
            initThree();
            appState.subscribe('stageChange', updateStage);
            renderPromptInput();
        };
    </script>
</body>
</html>
